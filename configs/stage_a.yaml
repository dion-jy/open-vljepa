# Stage A: Image-text pretraining on CC3M
# Goal: align V-JEPA2 visual representation with text embedding space
# before video phase (Stage B retrain) starts.

encoder:
  type: vjepa2-vitl
  # SSL pretrained backbone — same as Stage B
  model_name: facebook/vjepa2-vitl-fpc64-256
  frozen: true
  output_dim: null

y_encoder:
  type: embeddinggemma
  model_name: google/embeddinggemma-300m
  proj_dim: 1536
  max_target_len: 64
  lr_multiplier: 0.05

predictor:
  type: llama
  llama_name: meta-llama/Llama-3.2-1B
  n_keep_layers: 8
  proj_dim: 1536
  max_query_len: 64
  disable_causal_mask: true

data:
  dataset: cc3m
  data_dir: /data/junyeob/openvl-jepa-images/cc3m-wds
  loader: webdataset
  num_frames: 1               # image phase
  image_size: 256
  max_query_len: 64
  max_caption_len: 64
  query_text: "Describe the image."
  batch_size: 200             # ~16-20GB VRAM at 1 frame, bs=200; will tune via memory check
  num_workers: 4
  epoch_size: 2_500_000       # approximate (CC3M has ~3M, after filtering ~2.5M)

training:
  epochs: 10                  # ~25k iter total (12.5k iter/ep × 10 → similar to paper Stage A scaling)
  lr: 2.0e-4                  # 2x our Stage B (bigger eff bs 1.6k allows higher LR)
  schedule: warmup_constant   # paper-style; can switch to cosine if needed
  weight_decay: 0.01
  warmup_steps: 2000
  temperature: 0.07
  grad_clip: 1.0
  bf16: true
  gradient_accumulation_steps: 1
  gradient_checkpointing: true
  device: cuda:0
  checkpoint_dir: checkpoints_stage_a/
  log_every: 100
  save_every: 2
  keep_last_n: 3
  save_optimizer_state: false

eval:
  batch_size: 8
  metrics: [R@1, R@5, R@10]
  # MSRVTT eval not directly meaningful for Stage A (image phase)
  # Skip per-epoch eval; rely on Stage B retrain eval for true progress signal.
  every_n_epochs: 0
  at_epochs: null
  n_videos: 500
  max_seconds: null
